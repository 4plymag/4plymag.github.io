<!--THIS IS WHERE THE SLIDESHOW HTML BEGINS ref:https://www.w3schools.com/howto/tryit.asp?filename=tryhow_js_slideshow_gallery-->

<h1 style="text-align:center">Chart Slideshow Gallery</h2>
<!-- Container for the image gallery -->
<div class="container">

  <!-- Full-width images with number text -->
  <div class="mySlides">
    <div class="numbertext">1 / 6</div>
      <label class="click-to-gif" title="click/hit space to show gif">
<input type="checkbox">
<img src="images/test1.gif"
alt="Durao"
style="width:85%" class="center">
</label>

  </div>

  <div class="mySlides">
    <div class="numbertext">2 / 6</div>
      <img src="images/test2.gif" style="width:85%" class="center">
  </div>

  <div class="mySlides">
    <div class="numbertext">3 / 6</div>
      <img src="images/image3.jpg" style="width:85%" class="center">
  </div>

  <div class="mySlides">
    <div class="numbertext">4 / 6</div>
      <img src="images/image4.jpg" style="width:85%" class="center">
  </div>

  <div class="mySlides">
    <div class="numbertext">5 / 6</div>
      <img src="images/image5.jpg" style="width:85%" class="center">
  </div>

  <div class="mySlides">
    <div class="numbertext">6 / 6</div>
      <img src="images/image6.jpg" style="width:85%" class="center">
  </div>

  <!-- Next and previous buttons -->
  <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
  <a class="next" onclick="plusSlides(1)">&#10095;</a>

  <!-- Image text -->
  <div class="caption-container">
    <p id="caption"></p>
  </div>

  <!-- Thumbnail images -->
  <div class="row">
    <div class="column">
      <img class="demo cursor" src="images/thumb_image1.jpg" style="width:100%" onclick="currentSlide(1)" alt="Number of FS Kickflips: 6">
    </div>
    <div class="column"> 
      <img class="demo cursor" src="images/thumb_image2.jpg" style="width:100%" onclick="currentSlide(2)" alt="Fred Gall: #1">
    </div>
    <div class="column">
      <img class="demo cursor" src="images/thumb_image3.jpg" style="width:100%" onclick="currentSlide(3)" alt="Slide 3">
    </div>
    <div class="column">
      <img class="demo cursor" src="images/thumb_image4.jpg" style="width:100%" onclick="currentSlide(4)" alt="Slide... uh - 4!">
    </div>
    <div class="column">
      <img class="demo cursor" src="images/thumb_image5.jpg" style="width:100%" onclick="currentSlide(5)" alt="Fiver">
    </div> 
    <div class="column">
      <img class="demo cursor" src="images/thumb_image6.jpg" style="width:100%" onclick="currentSlide(6)" alt="Slide 6">
    </div>
  </div>
</div>

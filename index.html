    img: "images/quartersnacksindex.jpg", href: "/skateboarding_dataviz",
    date: "2020-04-28", author: "Jared Wilber", favorite: false
  },
  {
    num: -7, title: "Eric Koston Has No Signature Trick",
    blurb: "Rather than doing a few tricks many times, Koston does many tricks a few times.",
    img: "images/kostonindex.jpg", href: "/koston",
    date: "2020-04-13", author: "Jared Wilber", favorite: true
  }
];

// Assign proper numbers (1-indexed, by date ascending)
const sorted = [...ARTICLES].sort((a,b) => new Date(a.date) - new Date(b.date));
sorted.forEach((a, i) => { a.num = i + 1; });

const grid = document.getElementById('cardGrid');
const searchInput = document.getElementById('searchInput');
const resultCount = document.getElementById('resultCount');
const articleCount = document.getElementById('articleCount');
const sortBtns = document.querySelectorAll('.sort-btn');

articleCount.textContent = ARTICLES.length + ' articles and counting';

let currentSort = 'date';

function formatDate(d) {
    const dt = new Date(d + 'T00:00:00');
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    return months[dt.getMonth()] + ' ' + dt.getDate() + ', ' + dt.getFullYear();
}

function render() {
    const query = searchInput.value.toLowerCase().trim();
    let items = ARTICLES.filter(a => {
        if (!query) return true;
        return a.title.toLowerCase().includes(query)
            || a.blurb.toLowerCase().includes(query)
            || a.author.toLowerCase().includes(query);
    });

    const favOrder = ['/fredgall','/andrewallen','/koston','/yuto','/buntnetwork','/marisa2','/TomKpart1','/filmers','/frankgerwer','/thrashercovers','/jordantaylor','/patg','/blakecarpenter','/qstop10'];
    if (currentSort === 'date') {
        items.sort((a, b) => new Date(b.date) - new Date(a.date));
    } else {
        // Favorites in explicit order, then rest by date desc
        items.sort((a, b) => {
            const ai = favOrder.indexOf(a.href);
            const bi = favOrder.indexOf(b.href);
            if (ai !== -1 && bi !== -1) return ai - bi;
            if (ai !== -1) return -1;
            if (bi !== -1) return 1;
            return new Date(b.date) - new Date(a.date);
        });
    }

    resultCount.textContent = query ? items.length + ' result' + (items.length !== 1 ? 's' : '') : '';

    if (items.length === 0) {
        grid.innerHTML = '<div class="no-results">No articles found. Try a different search.</div>';
        return;
    }

    const pastels = ['#e05c8a','#5ca8e0','#3dba7a','#9b6ec5','#e8a33c','#45c4c4','#d45d5d','#6b80d4'];
    grid.innerHTML = items.map((a, i) => `
        <a class="card" href="${a.href}" style="--card-color:${pastels[i % pastels.length]}">
            <img class="card-img" src="${a.img}" alt="${a.title}" loading="lazy" />
            <div class="card-body">
                <div class="card-number">#${a.num}</div>
                <div class="card-title">${a.title}</div>
                <div class="card-blurb">${a.blurb}</div>
                <div class="card-meta">
                    <div class="card-date">${formatDate(a.date)}</div>
                    <div class="card-author">${a.author}</div>
                </div>
            </div>
        </a>
    `).join('');
}

searchInput.addEventListener('input', render);

sortBtns.forEach(btn => {
    btn.addEventListener('click', () => {
        sortBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSort = btn.dataset.sort;
        render();
    });
});

render();
</script>

</body>
</html>
